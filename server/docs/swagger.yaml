definitions:
  application.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  infra.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  infra.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  shared.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/shared.ErrorCode'
      errors:
        items:
          $ref: '#/definitions/shared.ValidationError'
        type: array
      message:
        type: string
      status:
        type: integer
      success:
        type: boolean
    type: object
  shared.ErrorCode:
    enum:
    - bad_request
    - invalid_input
    - unauthorized
    - internal_server_error
    - not_found
    - conflict
    type: string
    x-enum-varnames:
    - ErrBadRequest
    - ErrInvalidInput
    - ErrUnauthorized
    - ErrInternalServer
    - ErrNotFound
    - ErrConflict
  shared.ValidationError:
    properties:
      field:
        type: string
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Grants access to an existing user within the system
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/infra.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/application.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.APIResponse'
      summary: Login user
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Clears authentication cookie to log the user out
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.APIResponse'
      summary: Logout user
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user within the system
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/infra.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/application.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.APIResponse'
      summary: Register user
      tags:
      - Auth
  /api/v1/me:
    get:
      description: Get the current authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.APIResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - User
swagger: "2.0"
