basePath: /api/v1
definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 32
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  environments.CreateEnvironmentMigrationRequest:
    properties:
      client_id:
        type: string
      description:
        type: string
      environment_id:
        type: string
      name:
        type: string
      sql_content:
        type: string
    required:
    - client_id
    - description
    - environment_id
    - name
    - sql_content
    type: object
  environments.CreateEnvironmentRequest:
    properties:
      connection_url:
        type: string
      name:
        type: string
      project_id:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/environments.TypeofEnvironment'
        enum:
        - development
        - staging
        - production
    required:
    - connection_url
    - name
    - project_id
    - type
    type: object
  environments.Environment:
    properties:
      connection_error:
        type: string
      created_at:
        type: string
      db_engine:
        type: string
      id:
        type: string
      name:
        type: string
      project_id:
        type: string
      type:
        $ref: '#/definitions/environments.TypeofEnvironment'
      updated_at:
        type: string
    type: object
  environments.EnvironmentMigration:
    properties:
      client_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration:
        description: Duration in milliseconds to match INTEGER type
        type: integer
      environment_id:
        type: string
      error_message:
        type: string
      executed_at:
        type: string
      executed_by:
        type: string
      id:
        type: string
      name:
        type: string
      sql_content:
        type: string
      status:
        type: string
    type: object
  environments.PreviewMigrationRequest:
    properties:
      sql_content:
        type: string
    required:
    - sql_content
    type: object
  environments.SchemaColumn:
    properties:
      column_name:
        type: string
      data_type:
        type: string
      is_nullable:
        type: string
      table_name:
        type: string
    type: object
  environments.TypeofEnvironment:
    enum:
    - development
    - staging
    - production
    type: string
    x-enum-varnames:
    - Development
    - Staging
    - Production
  environments.UpdateEnvironmentRequest:
    properties:
      connection_url:
        type: string
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/environments.TypeofEnvironment'
        enum:
        - development
        - staging
        - production
    required:
    - connection_url
    - name
    - type
    type: object
  projects.CreateProjectRequest:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  projects.Project:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  projects.UpdateProjectRequest:
    properties:
      id:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - id
    - name
    type: object
  shared.ErrorResponse:
    properties:
      errors:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Authentication API for Envoy application
  title: Envoy Auth API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user by clearing the auth cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /environments/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an environment
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete environment
      tags:
      - environments
    get:
      consumes:
      - application/json
      description: Get a specific environment by ID
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/environments.Environment'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get environment by ID
      tags:
      - environments
    put:
      consumes:
      - application/json
      description: Update an existing environment
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      - description: Environment update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/environments.UpdateEnvironmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/environments.Environment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update environment
      tags:
      - environments
  /environments/{id}/migrations:
    get:
      consumes:
      - application/json
      description: Get all migrations for a specific environment
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/environments.EnvironmentMigration'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get environment migrations
      tags:
      - environments
    post:
      consumes:
      - application/json
      description: Execute a database migration in an environment with full tracking
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      - description: Migration execution request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/environments.CreateEnvironmentMigrationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Run database migration
      tags:
      - environments
  /environments/{id}/migrations/preview:
    post:
      consumes:
      - application/json
      description: Preview database schema changes by running migration in a transaction
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      - description: Migration preview request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/environments.PreviewMigrationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/environments.SchemaColumn'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview environment schema changes
      tags:
      - environments
  /environments/{id}/schema:
    get:
      consumes:
      - application/json
      description: Get database schema for a specific environment
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get environment schema
      tags:
      - environments
  /environments/{id}/validate:
    post:
      consumes:
      - application/json
      description: Validate database connection for an environment
      parameters:
      - description: Environment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Validate environment connection
      tags:
      - environments
  /migrations/{id}:
    get:
      consumes:
      - application/json
      description: Get a specific migration by ID
      parameters:
      - description: Migration ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/environments.EnvironmentMigration'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get environment migration by ID
      tags:
      - environments
  /projects:
    get:
      consumes:
      - application/json
      description: Get all projects for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/projects.Project'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Create a new project for the authenticated user
      parameters:
      - description: Project creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/projects.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/projects.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - projects
  /projects/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a project by ID for the authenticated user
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - projects
    get:
      consumes:
      - application/json
      description: Get a specific project by ID for the authenticated user
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/projects.Project'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a project
      tags:
      - projects
    put:
      consumes:
      - application/json
      description: Update an existing project for the authenticated user
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Project update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/projects.UpdateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/projects.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - projects
  /projects/{id}/environments:
    get:
      consumes:
      - application/json
      description: Get all environments for a specific project
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/environments.Environment'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all environments for project
      tags:
      - environments
    post:
      consumes:
      - application/json
      description: Create a new project environment for the authenticated user
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Environment creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/environments.CreateEnvironmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/environments.Environment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new project environment
      tags:
      - environments
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
