services:
  envoy-api:
    build: ./server
    container_name: envoy-api
    environment:
      - DATABASE_URL=/root/data/envoy.db
      - JWT_SECRET=your-secret-key
      - PORT=8080
      - APP_ENV=development
      - ENCRYPTION_KEY=your-encryption-key-32-chars-123
      - CHECKSUM_KEY=your-checksum-key-32-chars-12345
    ports:
      - "8080:8080"
    volumes:
      - ./data:/root/data
    depends_on:
      envoy-postgres-dev:
        condition: service_healthy
    networks:
      - envoy-network

  envoy-frontend:
    build: ./client
    container_name: envoy-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1/
    depends_on:
      - envoy-api
    networks:
      - envoy-network

  envoy-postgres-dev: # Used for development and testing of Postgres environments. Envoy uses SQLite as its primary database
    image: postgres:15-alpine
    container_name: envoy-postgres-dev
    environment:
      POSTGRES_DB: envoy_dev
      POSTGRES_USER: envoy_superuser
      POSTGRES_PASSWORD: superuser_password_123
    ports:
      - "5432:5432"
    volumes:
      - envoy-postgres-dev_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - envoy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envoy_superuser -d envoy_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: envoy-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@envoy.dev
      PGADMIN_DEFAULT_PASSWORD: admin_password_789
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - envoy-network
    depends_on:
      - envoy-postgres-dev

volumes:
  envoy-postgres-dev_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  envoy-network:
    driver: bridge
